<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тест Безопасной Панели</title>
    <!-- Подключаем Telegram SDK на случай теста внутри мессенджера -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --main-color: #2AABEE; }
        body { font-family: sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; }
        #spinner { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { border: 4px solid #333; border-top: 4px solid var(--main-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .header { background: var(--main-color); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .object-card { background: #222; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .price { color: #2AABEE; font-size: 18px; font-weight: bold; margin: 5px 0; }
        .desc { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Наш неубиваемый лоадер со статусами -->
    <div id="spinner">
        <div class="loader"></div>
        <p id="spinner-text" style="margin-top:15px;">Загрузка безопасных данных...</p>
        <p id="spinner-status" style="font-size:12px; color:#888; font-family:monospace; margin-top:5px;"></p>
    </div>

    <!-- Основной экран приложения -->
    <div id="app" style="display:none;">
        <header class="header">
            <div id="agent-brand">Панель Агента</div>
        </header>

        <!-- Сюда скрипт вставит карточки из Google Таблицы -->
        <div id="catalog-list"></div>
    </div>

    <!-- Подключаем логику -->
    <script src="main.js"></script>
</body>
</html>
